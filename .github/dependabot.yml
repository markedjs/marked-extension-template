version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 3
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    versioning-strategy: "increase"
    directory: "/"
    cooldown:
      default-days: 3
    schedule:
      interval: "weekly"
